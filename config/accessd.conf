# Access Control Daemon Configuration
# Location: ~/accessd/config/accessd.conf

[database]
# Database path
path = /home/nobuta/accessd/database/accessd.db
# Connection timeout (seconds)
timeout = 5

[accessd]
# Default policy: allow or deny
default_policy = deny
# Decision timeout (milliseconds)
decision_timeout = 5000
# Enable rule caching
enable_cache = true
# Cache TTL (seconds)
cache_ttl = 300

[log]
# Log file location
file = /home/nobuta/accessd/logs/accessd.log
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
# Console output
console = true
# Retention days
retention_days = 90

[network]
# API bind address
bind_address = 0.0.0.0
# API port
port = 8080
# Enable REST API
enable_api = true

[hardware]
# Default relay time (milliseconds)
relay_default_ms = 3000
# Door timeout (seconds)
door_timeout_sec = 30
# Door held timeout (seconds)
door_held_timeout_sec = 60

[security]
# Auto-expire users past valid_until
auto_expire_users = true
# Enable holiday check
enable_holiday_check = true
# System timezone
timezone = Asia/Ho_Chi_Minh
